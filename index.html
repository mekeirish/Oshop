<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O'SHOP | Officiel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --or: #ff6b00; --nuit: #2b2b2b; --fond: #121212; --argent: #e0e1dd; 
            --glass: rgba(255, 255, 255, 0.05);
            --gold-gradient: linear-gradient(135deg, #ff6b00 0%, #ff4500 100%);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--fond); color: var(--argent); padding-bottom: 160px; overflow-x: hidden; }

        /* SPLASH SCREEN STYLES */
        #splash-screen {
            position: fixed; inset: 0; background: var(--fond);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999; transition: opacity 0.5s ease;
        }
        .loader {
            width: 40px; height: 40px; border: 3px solid rgba(255,107,0,0.1);
            border-top: 3px solid var(--or); border-radius: 50%;
            animation: spin 1s linear infinite; margin-top: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Notifications */
        #toast-container { position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%); z-index: 35000; pointer-events: none; width: 90%; }
        .toast { background: white; color: black; padding: 12px; border-radius: 12px; font-weight: 800; box-shadow: var(--shadow); animation: slideUp 0.3s ease-out; font-size: 12px; border-left: 5px solid var(--or); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .promo-bar { background: var(--or); color: #000; font-weight: 900; padding: 8px; overflow: hidden; position: sticky; top: 0; z-index: 2000; font-size: 11px; }
        .marquee { display: inline-block; white-space: nowrap; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(43, 43, 43, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,107,0,0.2); position: sticky; top: 27px; z-index: 1000; }

        /* Grid Client */
        #shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: var(--glass); border-radius: 20px; padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); position: relative; cursor: pointer; }
        .img-box { width: 100%; height: 140px; background: #000; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: 0.3s; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .sold-out .img-box { filter: grayscale(1) brightness(0.3); }
        .sold-out-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #ff4d4d; color: white; padding: 5px 10px; border-radius: 5px; font-weight: 900; font-size: 12px; z-index: 5; border: 1px solid white; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 10000; display: none; padding: 15px; overflow-y: auto; }
        .modal-content { background: var(--nuit); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,107,0,0.3); width: 100%; max-width: 400px; margin: auto; box-sizing: border-box; }

        /* ADMIN STYLE */
        .admin-content { background: #f8f9fa; color: black; border-radius: 25px; padding: 20px; width: 100%; max-width: 500px; margin: 0 auto; box-sizing: border-box; position: relative; }
        .admin-section-btn { width: 100%; padding: 15px; background: white; border: 1px solid #ddd; border-radius: 15px; font-weight: 800; margin-bottom: 10px; text-align: left; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .admin-drawer { display: none; background: white; border: 1px solid #eee; border-radius: 0 0 15px 15px; padding: 15px; margin-top: -15px; margin-bottom: 15px; }
        
        /* Styles pour la gestion des stocks côté admin */
        .stock-row { display: flex; align-items: center; justify-content: space-between; background: white; padding: 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #eee; gap: 10px; }
        .stock-thumb { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; background: #000; }
        .stock-info { flex: 1; font-size: 13px; font-weight: 600; }
        .stock-price-admin { color: #666; font-size: 11px; }

        /* INPUTS CLIENT */
        .order-input { 
            width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.08); 
            box-sizing: border-box; color: white; font-size: 15px; outline: none;
        }
        .order-input::placeholder { color: rgba(255,255,255,0.4); }
        .admin-content .order-input { background: rgba(0,0,0,0.05); color: black; border: 1px solid rgba(0,0,0,0.1); }
        .order-input.active-field { border: 2px solid var(--or); background: white; }

        .btn-main { width: 100%; background: var(--gold-gradient); color: black; padding: 16px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* Pavé Numérique */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .num-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: 800; cursor: pointer; }
        .num-btn:active { background: var(--or); color: black; }
        
        .admin-content .num-btn { background: #eee; border-color: #ddd; color: black; padding: 15px; }

        /* Style boutons Historique */
        .hist-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-hist { background: #ff4d4d; color: white; border: none; border-radius: 8px; padding: 8px 12px; font-size: 11px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-hist.blue { background: #555555; }

        .cart-bar { position: fixed; bottom: 15px; left: 10px; right: 10px; background: var(--gold-gradient); color: black; padding: 12px; display: none; flex-direction: column; z-index: 5000; border-radius: 20px; box-shadow: var(--shadow); }
    </style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body>

<div id="splash-screen">
    <div style="font-weight: 800; color: var(--or); font-size: 32px; letter-spacing: 2px;">O'SHOP</div>
    <div class="loader"></div>
</div>

<div id="toast-container"></div>
<div class="promo-bar"><div class="marquee" id="promo-text">O'SHOP | BIENVENUE</div></div>

<header>
    <div style="font-weight: 800; color: var(--or); font-size: 20px;">O'SHOP</div>
    <button onclick="openLogin()" style="background:var(--glass); border:1px solid var(--or); color:var(--or); padding:6px 15px; border-radius:10px; font-weight:bold; cursor:pointer;">PRO</button>
</header>

<div id="shop-grid"></div>

<div id="cart-bar" class="cart-bar">
    <div id="cart-items-display" style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;"></div>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span id="cart-total" style="font-weight: 800; font-size: 18px;">0 DZD</span>
        <button onclick="openCheckout()" style="background:black; color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:800; cursor:pointer;">COMMANDER</button>
    </div>
</div>

<div id="modal-login" class="modal" style="display: none; align-items: center;">
    <div class="modal-content" style="text-align:center;">
        <h3 style="color:var(--or); margin-bottom: 5px;">Accès Pro</h3>
        <div id="login-dots" style="letter-spacing: 10px; font-size: 30px; color: var(--or); min-height: 40px;"></div>
        <div class="numpad">
            <button class="num-btn" onclick="pressNum('1')">1</button>
            <button class="num-btn" onclick="pressNum('2')">2</button>
            <button class="num-btn" onclick="pressNum('3')">3</button>
            <button class="num-btn" onclick="pressNum('4')">4</button>
            <button class="num-btn" onclick="pressNum('5')">5</button>
            <button class="num-btn" onclick="pressNum('6')">6</button>
            <button class="num-btn" onclick="pressNum('7')">7</button>
            <button class="num-btn" onclick="pressNum('8')">8</button>
            <button class="num-btn" onclick="pressNum('9')">9</button>
            <button class="num-btn" style="color:#ff4d4d" onclick="clearNum()">✕</button>
            <button class="num-btn" onclick="pressNum('0')">0</button>
            <button class="num-btn" style="color:#28a745" onclick="checkAuth()">OK</button>
        </div>
        <button onclick="closeModal('modal-login')" style="width:100%; background:none; border:none; color:white; margin-top:20px; opacity:0.5; cursor:pointer;">Annuler</button>
    </div>
</div>

<div id="modal-admin" class="modal">
    <div class="admin-content">
        <button onclick="closeModal('modal-admin')" style="position: absolute; right: 20px; top: 20px; border:none; background:black; color:white; border-radius:50%; width:30px; height:30px; font-weight:bold; cursor:pointer;">✕</button>
        <h2 style="margin:0 0 20px 0;">Administration</h2>
        
        <button class="admin-section-btn" onclick="toggleDrawer('drawer-promo')">📢 Promo <span>+</span></button>
        <div id="drawer-promo" class="admin-drawer">
            <input type="text" id="in-promo" placeholder="Texte défilant..." class="order-input">
            <button onclick="savePromo()" class="btn-main" style="padding:10px;">Mettre à jour</button>
        </div>

        <button class="admin-section-btn" onclick="toggleDrawer('drawer-new')">🆕 Nouveau Produit <span>+</span></button>
        <div id="drawer-new" class="admin-drawer">
            <input type="text" id="in-name" placeholder="Nom de l'article" class="order-input">
            <input type="file" id="in-img" class="order-input" accept="image/*">
            <input type="number" id="in-price" placeholder="Prix (DZD)" class="order-input">
            <input type="number" id="in-qty" placeholder="Quantité en stock" class="order-input">
            <button onclick="saveProduct()" class="btn-main" id="btn-save-prod">Enregistrer l'article</button>
        </div>

        <button class="admin-section-btn" onclick="toggleDrawer('drawer-stock')">📦 Gérer le Stock <span>+</span></button>
        <div id="drawer-stock" class="admin-drawer"><div id="admin-inventory"></div></div>

        <button class="admin-section-btn" onclick="toggleDrawer('drawer-orders')">🛒 Commandes en cours <span id="orders-count-badge"></span></button>
        <div id="drawer-orders" class="admin-drawer"><div id="admin-orders-list"></div></div>

        <button class="admin-section-btn" onclick="toggleDrawer('drawer-history')">📜 Historique des Ventes <span>+</span></button>
        <div id="drawer-history" class="admin-drawer">
            <div style="display:flex; justify-content: space-between; margin-bottom:15px; align-items:center;">
                <b style="color:#28a745">Total: <span id="stat-total">0</span> DZD</b>
                <div class="hist-actions">
                    <button onclick="exportHistory()" class="btn-hist blue">TXT</button>
                    <button onclick="resetHistory()" class="btn-hist">Vider</button>
                </div>
            </div>
            <div id="history-display"></div>
        </div>

        <button class="admin-section-btn" onclick="toggleDrawer('drawer-reset-code')">🔑 Réinitialiser le code <span>+</span></button>
        <div id="drawer-reset-code" class="admin-drawer">
            <div id="reset-form">
                <input type="password" id="old-code" placeholder="Code actuel" class="order-input" readonly onclick="setActiveResetField('old-code')">
                <input type="password" id="new-code" placeholder="Nouveau code" class="order-input" readonly onclick="setActiveResetField('new-code')">
                <input type="password" id="conf-code" placeholder="Confirmation" class="order-input" readonly onclick="setActiveResetField('conf-code')">
                
                <div class="numpad">
                    <button class="num-btn" onclick="pressResetNum('1')">1</button>
                    <button class="num-btn" onclick="pressResetNum('2')">2</button>
                    <button class="num-btn" onclick="pressResetNum('3')">3</button>
                    <button class="num-btn" onclick="pressResetNum('4')">4</button>
                    <button class="num-btn" onclick="pressResetNum('5')">5</button>
                    <button class="num-btn" onclick="pressResetNum('6')">6</button>
                    <button class="num-btn" onclick="pressResetNum('7')">7</button>
                    <button class="num-btn" onclick="pressResetNum('8')">8</button>
                    <button class="num-btn" onclick="pressResetNum('9')">9</button>
                    <button class="num-btn" style="color:#ff4d4d" onclick="clearResetNum()">✕</button>
                    <button class="num-btn" onclick="pressResetNum('0')">0</button>
                    <button class="num-btn" style="background:var(--or); font-size: 14px;" onclick="updateAdminCode()">Mettre à jour</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modal-details" class="modal" style="display: none; align-items: center;">
    <div class="modal-content">
        <div class="img-box" style="height:200px; margin-bottom:15px;"><img id="view-img" src=""></div>
        <h2 id="view-name" style="margin:0; text-align:center; color:white;"></h2>
        <div id="view-price" style="text-align: center; font-size: 24px; font-weight: 800; color: var(--or); margin: 10px 0;"></div>
        <div style="display:flex; justify-content: center; align-items:center; gap:20px; margin-bottom:20px;">
            <button onclick="changeQty(-1)" style="width:40px; height:40px; border-radius:10px; border:none; font-weight:bold; font-size:18px; cursor:pointer;">-</button>
            <span id="order-qty" style="font-size: 20px; font-weight: 800; color:white;">1</span>
            <button onclick="changeQty(1)" style="width:40px; height:40px; border-radius:10px; border:none; font-weight:bold; font-size:18px; cursor:pointer;">+</button>
        </div>
        <button id="add-btn" class="btn-main" onclick="addToCart()">AJOUTER AU PANIER</button>
        <button onclick="closeModal('modal-details')" style="width:100%; background:none; border:none; color:white; margin-top:15px; opacity:0.5; cursor:pointer;">Fermer</button>
    </div>
</div>

<div id="modal-checkout" class="modal" style="display: none; align-items: center;">
    <div class="modal-content">
        <h3 style="color:var(--or); text-align:center; margin-bottom: 20px;">Finaliser l'achat</h3>
        <input type="text" id="order-name" placeholder="Votre Nom Complet" class="order-input">
        <input type="tel" id="order-tel" placeholder="N° de Téléphone" class="order-input">
        <button onclick="confirmOrder()" class="btn-main">COMMANDER MAINTENANT</button>
        <button onclick="closeModal('modal-checkout')" style="width:100%; background:none; border:none; color:white; margin-top:15px; opacity:0.6; cursor:pointer;">Retour</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBBvh2sQx0nmsV6wAXl3tEuIJVTAO5doZA",
      authDomain: "the-shop-fd199.firebaseapp.com",
      databaseURL: "https://the-shop-fd199-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "the-shop-fd199",
      storageBucket: "the-shop-fd199.firebasestorage.app",
      messagingSenderId: "593661911382",
      appId: "1:593661911382:web:1d5425fcc2aeaf4bbd36f7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = {}; let cart = {}; let active = null; let tempQty = 1;
    let authCode = "";
    let currentAdminPass = "001747";
    let activeResetField = 'old-code';

    // Synchronisation du code admin avec la DB
    db.ref('admin_code').on('value', snap => {
        if(snap.val()) currentAdminPass = snap.val().toString();
        else db.ref('admin_code').set("001747");
    });

    db.ref('products').on('value', snap => { 
        products = snap.val() || {}; 
        renderClient(); 
        renderAdminInventory();
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            if(splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }
        }, 800);
    });

    function notify(text) {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = text;
        container.appendChild(t); 
        if (navigator.vibrate) navigator.vibrate(50);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(()=> t.remove(), 400); }, 2500);
    }

    // Pavé Numérique de Connexion
    function pressNum(n) { if(authCode.length < 6) { authCode += n; updateDots(); } }
    function clearNum() { authCode = ""; updateDots(); }
    function updateDots() { document.getElementById('login-dots').innerText = "•".repeat(authCode.length); }

    // Pavé Numérique interne (Reset Code)
    function setActiveResetField(id) {
        activeResetField = id;
        document.querySelectorAll('#reset-form .order-input').forEach(el => el.classList.remove('active-field'));
        document.getElementById(id).classList.add('active-field');
    }

    function pressResetNum(n) {
        const field = document.getElementById(activeResetField);
        if(field.value.length < 6) field.value += n;
    }

    function clearResetNum() {
        document.getElementById(activeResetField).value = "";
    }

    function updateAdminCode() {
        const oldC = document.getElementById('old-code').value;
        const newC = document.getElementById('new-code').value;
        const confC = document.getElementById('conf-code').value;

        if(oldC !== currentAdminPass) return notify("Code actuel incorrect !");
        if(newC.length < 4) return notify("Code trop court !");
        if(newC !== confC) return notify("Confirmation différente !");

        db.ref('admin_code').set(newC).then(() => {
            notify("Code Admin mis à jour !");
            document.getElementById('old-code').value = "";
            document.getElementById('new-code').value = "";
            document.getElementById('conf-code').value = "";
            toggleDrawer('drawer-reset-code');
        });
    }

    function toggleDrawer(id) {
        const d = document.getElementById(id);
        const isOpen = d.style.display === 'block';
        document.querySelectorAll('.admin-drawer').forEach(el => el.style.display = 'none');
        d.style.display = isOpen ? 'none' : 'block';
        if(id === 'drawer-history' && !isOpen) viewHistory();
        if(id === 'drawer-reset-code' && !isOpen) setActiveResetField('old-code');
    }

    function openLogin() { authCode = ""; updateDots(); document.getElementById('modal-login').style.display = 'flex'; }
    
    function checkAuth() {
        if(authCode === currentAdminPass) {
            closeModal('modal-login'); document.getElementById('modal-admin').style.display = 'block';
        } else { notify("Accès refusé !"); authCode = ""; updateDots(); }
    }

    db.ref('orders').on('value', snap => {
        const data = snap.val();
        renderOrders(data);
        const count = data ? Object.keys(data).length : 0;
        document.getElementById('orders-count-badge').innerText = count > 0 ? `(${count}) +` : '+';
    });
    
    db.ref('promo').on('value', snap => { document.getElementById('promo-text').innerText = snap.val() || "BIENVENUE CHEZ O'SHOP"; });

    function resizeImage(file, maxWidth, maxHeight, quality) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } }
                    else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
            };
        });
    }

    async function saveProduct() {
        const n = document.getElementById('in-name').value, p = document.getElementById('in-price').value, q = document.getElementById('in-qty').value, f = document.getElementById('in-img').files[0];
        if(!n || !f || !p) return notify("Champs manquants !");
        const btn = document.getElementById('btn-save-prod'); btn.innerText = "PATIENTEZ..."; btn.disabled = true;
        try {
            const compressedImg = await resizeImage(f, 800, 800, 0.7);
            db.ref('products').push({ name: n, img: compressedImg, price: parseInt(p), qty: parseInt(q) });
            notify("Produit ajouté !");
            document.getElementById('in-name').value = ""; document.getElementById('in-price').value = ""; document.getElementById('in-qty').value = "";
            document.getElementById('in-img').value = "";
            toggleDrawer('drawer-new');
        } catch (e) { notify("Erreur d'image"); } finally { btn.innerText = "Enregistrer l'article"; btn.disabled = false; }
    }

    function renderClient() {
        const grid = document.getElementById('shop-grid'); grid.innerHTML = "";
        for (let id in products) {
            let p = products[id]; let isOut = p.qty <= 0;
            grid.innerHTML += `<div class="card ${isOut ? 'sold-out' : ''}" onclick="${isOut ? '' : `openP('${id}')`}">${isOut ? '<div class="sold-out-badge">ÉPUISÉ</div>' : ''}<div class="img-box"><img src="${p.img}"></div><div style="margin-top:10px; font-weight:600; font-size:13px;">${p.name}</div><div style="color:var(--or); font-weight:800;">${p.price} DZD</div></div>`;
        }
    }

    function openP(id) {
        active = { ...products[id], key: id }; tempQty = 1;
        document.getElementById('order-qty').innerText = tempQty;
        document.getElementById('view-name').innerText = active.name;
        document.getElementById('view-img').src = active.img;
        document.getElementById('view-price').innerText = active.price + " DZD";
        document.getElementById('modal-details').style.display = 'flex';
    }

    function changeQty(val) { let n = tempQty + val; if(n >= 1 && n <= active.qty) { tempQty = n; document.getElementById('order-qty').innerText = tempQty; } }

    function addToCart() {
        if(cart[active.key]) { 
            if ((cart[active.key].count + tempQty) <= active.qty) {
                cart[active.key].count += tempQty; 
            } else {
                return notify("Quantité maximale en stock atteinte !");
            }
        } 
        else { cart[active.key] = { name: active.name, price: active.price, count: tempQty }; }
        updateCartBar(); closeModal('modal-details'); notify(`${tempQty}x ${active.name} ajouté !`);
    }

    function removeFromCart(id) { delete cart[id]; updateCartBar(); notify("Retiré"); }

    function updateCartBar() {
        let total = 0; const display = document.getElementById('cart-items-display'); display.innerHTML = "";
        for(let id in cart) { total += cart[id].price * cart[id].count; display.innerHTML += `<div style="background:rgba(255,107,0,0.15); color:white; padding:5px 10px; border-radius:10px; font-size:11px; font-weight:700; display:flex; align-items:center; gap:6px;">${cart[id].count}x ${cart[id].name}<button onclick="removeFromCart('${id}')" style="color:#ff4d4d; border:none; background:none; font-weight:900; cursor:pointer;">✕</button></div>`; }
        document.getElementById('cart-bar').style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('cart-total').innerText = `${total} DZD`;
    }

    function openCheckout() { document.getElementById('modal-checkout').style.display = 'flex'; }

    function confirmOrder() {
        const n = document.getElementById('order-name').value, t = document.getElementById('order-tel').value;
        if (!n || !t) return notify("Infos manquantes !");
        let items = [];
        for(let id in cart) { items.push(`${cart[id].count}x ${cart[id].name}`); db.ref(`products/${id}/qty`).transaction(q => (q || 0) - cart[id].count); }
        db.ref('orders').push({ name: n, tel: t, total: document.getElementById('cart-total').innerText, items: items, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString() });
        cart = {}; updateCartBar(); closeModal('modal-checkout'); notify("Envoyé !");
    }

    function renderAdminInventory() {
        const div = document.getElementById('admin-inventory'); 
        if(Object.keys(products).length === 0) { div.innerHTML = "<p style='text-align:center;'>Aucun produit</p>"; return; }
        div.innerHTML = "";
        for (let id in products) {
            div.innerHTML += `<div class="stock-row"><img src="${products[id].img}" class="stock-thumb"><div class="stock-info">${products[id].name}<br><span class="stock-price-admin">${products[id].price} DZD</span></div><div style="display:flex; gap:5px; align-items:center;"><input type="number" value="${products[id].qty}" onchange="updateProduct('${id}', 'qty', this.value)" style="width:50px; padding:6px; border-radius:5px; border:1px solid #ddd; font-weight:bold;"><button onclick="deleteProduct('${id}')" style="background:#ff4d4d; color:white; border:none; padding:8px 12px; border-radius:8px; font-weight:bold; cursor:pointer;">✕</button></div></div>`;
        }
    }

    function updateProduct(id, field, val) { db.ref(`products/${id}/${field}`).set(parseInt(val)); notify("OK"); }
    function deleteProduct(id) { if(confirm("Supprimer ?")) db.ref(`products/${id}`).remove(); }

    function renderOrders(data) {
        const div = document.getElementById('admin-orders-list');
        if(!data) { div.innerHTML = "<p style='text-align:center; padding:20px; color:#666;'>Aucune commande.</p>"; return; }
        div.innerHTML = "";
        for (let id in data) {
            div.innerHTML += `<div style="background:#fff; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid #eee; border-left:5px solid var(--or); word-wrap: break-word;"><b>${data[id].name}</b> <span style="float:right; font-weight:bold; color:var(--nuit);">${data[id].total}</span><br><small style="color:#555; display:block; margin:5px 0;">${data[id].items.join(', ')}</small><div style="margin-top:10px; display:flex; gap:5px;"><a href="tel:${data[id].tel}" style="flex:1; background:#555555; color:white; text-align:center; padding:10px; border-radius:10px; text-decoration:none; font-size:12px; font-weight:bold;">APPELER</a><button onclick="valider('${id}')" style="flex:1; background:#28a745; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">VALIDER</button></div></div>`;
        }
    }

    function valider(id) { db.ref('orders/'+id).once('value', snap => { db.ref('history/'+id).set({...snap.val()}); db.ref('orders/'+id).remove(); notify("Archivée"); }); }

    function viewHistory() {
        db.ref('history').once('value', snap => {
            const h = snap.val(), div = document.getElementById('history-display');
            if(!h) { div.innerHTML = "<p style='text-align:center; color:#888;'>Vide.</p>"; return; }
            let html = "", total = 0;
            for(let id in h) { 
                let parsedTotal = parseInt(h[id].total.replace(/\s/g, '').replace('DZD', '')) || 0;
                total += parsedTotal; 
                html += `<div style="font-size:11px; border-bottom:1px solid #eee; padding:8px 0; color:#333;"><b>${h[id].date}</b> | ${h[id].name} | <b>${h[id].total}</b></div>`; 
            }
            div.innerHTML = html; document.getElementById('stat-total').innerText = total;
        });
    }

    function exportHistory() {
        db.ref('history').once('value', snap => {
            let data = snap.val(); if(!data) return notify("Vide");
            let txt = "--- O'SHOP : RAPPORT DES VENTES ---\n\n";
            let totalGeneral = 0;
            for(let id in data) {
                let parsedTotal = parseInt(data[id].total.replace(/\s/g, '').replace('DZD', '')) || 0;
                totalGeneral += parsedTotal;
                txt += `DATE: ${data[id].date} ${data[id].time}\nCLIENT: ${data[id].name}\nTEL: ${data[id].tel}\nARTICLES: ${data[id].items.join(', ')}\nTOTAL: ${data[id].total}\n--------------------------\n`;
            }
            txt += `\nCHIFFRE D'AFFAIRES TOTAL: ${totalGeneral} DZD`;
            const blob = new Blob([txt], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Ventes_O-Shop.txt`;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); window.URL.revokeObjectURL(url);
            notify("TXT téléchargé !");
        });
    }

    function savePromo() { db.ref('promo').set(document.getElementById('in-promo').value.toUpperCase()); notify("Promo OK"); toggleDrawer('drawer-promo'); }
    function resetHistory() { if(confirm("Vider historique ?")) db.ref('history').remove().then(()=>viewHistory()); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>

<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
</html>
